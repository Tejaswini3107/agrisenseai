name: AgriSense AI — 7 Stage Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 561818313889.dkr.ecr.eu-north-1.amazonaws.com

jobs:

  # ─── Stage 1: Lint ───────────────────────────────────────
  lint:
    name: "Stage 1 — Lint & Code Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint backend
        run: flake8 agrisense-backend --max-line-length=120 --exclude=__pycache__,venv,.venv,agrisense-backend/ml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install admin deps
        run: npm install --prefix agrisense-admin-website

      - name: Lint admin
        run: npm run lint --prefix agrisense-admin-website

  # ─── Stage 2: Unit Tests ─────────────────────────────────
  test:
    name: "Stage 2 — Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r agrisense-backend/requirements.txt

      - name: Run pytest
        run: pytest agrisense-backend/tests -v

  # ─── Stage 3: Security Scan ──────────────────────────────
  security:
    name: "Stage 3 — Security Scan"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan backend dependencies
        run: pip-audit -r agrisense-backend/requirements.txt

      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ─── Stage 4: Build ──────────────────────────────────────
  build:
    name: "Stage 4 — Docker Build"
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t agrisense-backend ./agrisense-backend

      - name: Build admin image
        run: docker build -t agrisense-admin ./agrisense-admin-website

  # ─── Stage 5: Push to ECR ────────────────────────────────
  push:
    name: "Stage 5 — Push to ECR"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build and push backend
        run: |
          docker build -t agrisense-backend ./agrisense-backend
          docker tag agrisense-backend ${{ env.ECR_REGISTRY }}/agrisense-backend:latest
          docker push ${{ env.ECR_REGISTRY }}/agrisense-backend:latest

      - name: Build and push admin
        run: |
          docker build -t agrisense-admin ./agrisense-admin-website
          docker tag agrisense-admin ${{ env.ECR_REGISTRY }}/agrisense-admin:latest
          docker push ${{ env.ECR_REGISTRY }}/agrisense-admin:latest

  # ─── Stage 6: Deploy ─────────────────────────────────────
  deploy:
    name: "Stage 6 — Deploy to EC2"
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region eu-north-1 | \
            docker login --username AWS --password-stdin 561818313889.dkr.ecr.eu-north-1.amazonaws.com
            docker pull 561818313889.dkr.ecr.eu-north-1.amazonaws.com/agrisense-backend:latest
            docker pull 561818313889.dkr.ecr.eu-north-1.amazonaws.com/agrisense-admin:latest
            cd ~/agrisense
            docker compose down
            docker compose up -d

  # ─── Stage 7: Smoke Test ─────────────────────────────────
  smoke-test:
    name: "Stage 7 — Smoke Test"
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for services to start
        run: sleep 15

      - name: Check backend health
        run: |
          curl --fail http://${{ secrets.EC2_HOST }}:8000/health || exit 1

      - name: Check admin site
        run: |
          curl --fail http://${{ secrets.EC2_HOST }}:3000 || exit 1